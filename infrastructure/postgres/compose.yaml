name: postgres

services:
  postgres:
    image: postgres:18.4-bookworm@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
    restart: unless-stopped
    env_file:
      - path: ./runtime.env
        required: true
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:?POSTGRES_MAX_CONNECTIONS is required}
    shm_size: 128m
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - postgres-net
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 60s
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --username "$${POSTGRES_USER}" --dbname "$${POSTGRES_DB}"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

networks:
  postgres-net:
    name: postgres-net

volumes:
  postgres-data:
    name: postgres-data
