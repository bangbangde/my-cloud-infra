name: Auto Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "选择要部署的服务"
        required: true
        type: choice
        default: my-pages
        options:
          - my-pages
          - codebuff-next
          - traefik
      confirm:
        description: "确认部署"
        required: true
        type: choice
        default: "NO"
        options:
          - "NO"
          - "YES"
  repository_dispatch:
    types:
      - app-update

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate request
        id: request
        shell: bash
        env:
          CONFIRM: ${{ inputs.confirm }}
          IMAGE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.image_tag || '' }}
          SERVICE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.service || inputs.service }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "$CONFIRM" != "YES" ]]; then
            echo "❌ Deploy cancelled. Select YES to confirm."
            exit 1
          fi

          case "$SERVICE" in
            my-pages|codebuff-next|traefik) ;;
            *)
              echo "❌ Unsupported service: $SERVICE"
              exit 1
              ;;
          esac

          if [[ -n "$IMAGE_TAG" && ! "$IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "❌ Invalid image tag."
            exit 1
          fi

          printf 'service=%s\n' "$SERVICE" >> "$GITHUB_OUTPUT"
          printf 'image_tag=%s\n' "$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        # v1.2.5
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          IMAGE_TAG: ${{ steps.request.outputs.image_tag }}
          SERVICE: ${{ steps.request.outputs.service }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USERNAME,IMAGE_TAG,SERVICE
          command_timeout: 20m
          script: |
            set -Eeuo pipefail

            cd ~/my-cloud-infra

            echo "==> Pull latest infrastructure configuration"
            git pull --ff-only origin main

            if [[ "$SERVICE" != "traefik" && ! -f "apps/${SERVICE}.yml" ]]; then
              echo "❌ Service configuration not found: apps/${SERVICE}.yml"
              exit 1
            fi

            echo "==> Deploying $SERVICE"

            if [[ "$SERVICE" == "traefik" ]]; then
              docker compose -f docker-compose.yml config --quiet
              docker compose -f docker-compose.yml up -d --pull always
              echo "✅ Deploy finished"
              exit 0
            fi

            COMPOSE_FILE="apps/${SERVICE}.yml"
            VERSION_ENV="$(printf '%s' "$SERVICE" | tr '[:lower:]-' '[:upper:]_')_VERSION"

            if [[ -n "$IMAGE_TAG" ]]; then
              printf -v "$VERSION_ENV" '%s' "$IMAGE_TAG"
              export "$VERSION_ENV"
              echo "==> Using image tag: $IMAGE_TAG"
            else
              echo "==> Using version from .env or Compose defaults"
            fi

            docker compose -f "$COMPOSE_FILE" config --quiet

            logged_in=false
            cleanup() {
              if [[ "$logged_in" == true ]]; then
                docker logout ghcr.io >/dev/null 2>&1 || true
              fi
            }
            trap cleanup EXIT

            echo "==> Login to GitHub Container Registry"
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            logged_in=true

            echo "==> Record current image digest for rollback"
            if CURRENT_IMAGE_ID=$(docker inspect "$SERVICE" --format='{{.Image}}' 2>/dev/null); then
              CURRENT_DIGEST=$(docker image inspect "$CURRENT_IMAGE_ID" --format='{{index .RepoDigests 0}}' 2>/dev/null || true)
              if [[ -n "$CURRENT_DIGEST" ]]; then
                printf '%s\n' "$CURRENT_DIGEST" > ".rollback_digest_${SERVICE}"
                echo "==> Current digest: $CURRENT_DIGEST"
              else
                echo "==> Current image has no repository digest; rollback record unchanged"
              fi
            else
              echo "==> Container is not running; rollback record unchanged"
            fi

            echo "==> Pull image"
            docker compose -f "$COMPOSE_FILE" pull

            echo "==> Update service"
            docker compose -f "$COMPOSE_FILE" up -d

            echo "==> Wait for service health"
            HEALTH="starting"
            for i in {1..20}; do
              HEALTH=$(docker inspect "$SERVICE" --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' 2>/dev/null || true)
              case "$HEALTH" in
                healthy)
                  echo "✅ Health check passed"
                  break
                  ;;
                running)
                  echo "⚠️ Container is running but has no HEALTHCHECK"
                  break
                  ;;
                unhealthy|exited|dead)
                  echo "❌ Container state: ${HEALTH:-not found}"
                  docker logs --tail 100 "$SERVICE" 2>&1 || true
                  exit 1
                  ;;
              esac
              echo "⏳ Waiting for health check... ($i/20, state: ${HEALTH:-not found})"
              sleep 5
            done

            if [[ "$HEALTH" != "healthy" && "$HEALTH" != "running" ]]; then
              echo "❌ Health check timed out (state: ${HEALTH:-not found})"
              docker logs --tail 100 "$SERVICE" 2>&1 || true
              exit 1
            fi

            echo "==> Cleanup old images (keep last 5)"
            IMAGE_REF=$(docker compose -f "$COMPOSE_FILE" config --images | sed -n '1p')
            IMAGE_REPO=$(printf '%s\n' "$IMAGE_REF" | sed -E 's/@sha256:.*$//; s#:[^/]+$##')
            if [[ -n "$IMAGE_REPO" ]]; then
              docker images "$IMAGE_REPO" --format '{{.CreatedAt}}\t{{.ID}}' |
                sort -r |
                awk -F '\t' 'NR > 5 { print $2 }' |
                sort -u |
                xargs -r docker rmi 2>/dev/null || true
            fi

            echo "✅ Deploy finished"
