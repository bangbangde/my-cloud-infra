name: Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Traefik、PostgreSQL、Garage 或 apps/ 下的应用目录名"
        required: true
        type: string
      image_tag:
        description: "应用镜像标签；部署基础设施时留空"
        required: false
        type: string
      confirm:
        description: "确认部署"
        required: true
        type: choice
        default: "NO"
        options:
          - "NO"
          - "YES"
  repository_dispatch:
    types:
      - app-update

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Validate request
        id: request
        shell: bash
        env:
          CONFIRM: ${{ inputs.confirm }}
          EVENT_NAME: ${{ github.event_name }}
          IMAGE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.image_tag || inputs.image_tag }}
          SERVICE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.service || inputs.service }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$CONFIRM" != "YES" ]]; then
            echo "Deploy cancelled. Select YES to confirm."
            exit 1
          fi

          if [[ ! "$SERVICE" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            echo "Invalid service name: $SERVICE"
            exit 1
          fi

          if [[ "$SERVICE" == "traefik" || "$SERVICE" == "postgres" || "$SERVICE" == "garage" ]]; then
            if [[ "$EVENT_NAME" == "repository_dispatch" ]]; then
              echo "Infrastructure services can only be deployed manually."
              exit 1
            fi
            if [[ -n "$IMAGE_TAG" ]]; then
              echo "Infrastructure deployment does not accept an image tag."
              exit 1
            fi
          else
            if [[ -z "$IMAGE_TAG" ]]; then
              echo "Application deployment requires image_tag."
              exit 1
            fi
            if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
              echo "Invalid image tag."
              exit 1
            fi
          fi

          printf 'service=%s\n' "$SERVICE" >> "$GITHUB_OUTPUT"
          printf 'image_tag=%s\n' "$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        # v1.2.5
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          IMAGE_TAG: ${{ steps.request.outputs.image_tag }}
          SERVICE: ${{ steps.request.outputs.service }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG,SERVICE
          command_timeout: 20m
          script: |
            set -Eeuo pipefail

            cd ~/my-cloud-infra

            exec 9>.ops.lock
            if ! flock -n 9; then
              echo "Another infrastructure operation is already running."
              exit 1
            fi
            export OPS_LOCK_HELD=1

            git pull --ff-only origin main

            if [[ -f "infrastructure/${SERVICE}/compose.yaml" ]]; then
              bash ./scripts/ops.sh deploy "$SERVICE"
              exit 0
            fi

            if [[ ! -f "apps/${SERVICE}/compose.yaml" ]]; then
              echo "Application not found: apps/${SERVICE}/compose.yaml"
              exit 1
            fi

            bash ./scripts/ops.sh deploy "$SERVICE" "$IMAGE_TAG"
