name: codebuff-next

services:
  codebuff-next:
    image: ${IMAGE_REPOSITORY:?IMAGE_REPOSITORY is required}:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.codebuff-next.rule=Host(`${APP_DOMAIN:?APP_DOMAIN is required}`)"
      - "traefik.http.routers.codebuff-next.entrypoints=websecure"
      - "traefik.http.routers.codebuff-next.tls.certresolver=letsencrypt"
    networks:
      - traefik-net
      - postgres-net

networks:
  traefik-net:
    external: true
    name: traefik-net
  postgres-net:
    external: true
    name: postgres-net
