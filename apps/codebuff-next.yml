services:
  codebuff-next:
    image: ${CODEBUFF_NEXT_FULL_IMAGE:-${CODEBUFF_NEXT_IMAGE:-ghcr.io/bangbangde/codebuff-next}:${CODEBUFF_NEXT_VERSION:-latest}}
    container_name: codebuff-next
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.codebuff-next.rule=Host(`codebuff.tech`)"
      - "traefik.http.routers.codebuff-next.entrypoints=websecure"
      - "traefik.http.routers.codebuff-next.tls.certresolver=letsencrypt"
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
