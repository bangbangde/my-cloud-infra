version: 1

# 复制为 config/env.yml 后，将 <app-id> 替换为 apps/ 下的实际目录名。
# files 中必须覆盖仓库内每一个 .env.example 或 *.runtime.env.example 对应的目标文件。
# 所有值都必须解析为 YAML 字符串，建议统一加引号；脚本会生成权限为 0600 的 dotenv 文件。
files:
  infrastructure/traefik/.env:
    DOMAIN_NAME: "example.com"
    ACME_EMAIL: "your-email@example.com"
    DASHBOARD_USERS: 'admin:$2y$05$xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'

  infrastructure/traefik/runtime.env:
    TENCENTCLOUD_SECRET_ID: "your-secret-id-here"
    TENCENTCLOUD_SECRET_KEY: "your-secret-key-here"

  "apps/<app-id>/.env":
    IMAGE_REPOSITORY: "ghcr.io/example/<app-id>"
    APP_DOMAIN: "<app-id>.example.com"
    IMAGE_TAG: "sha-REPLACE_ME"

  # 如果某个应用提交了 runtime.env.example 或 <service>.runtime.env.example，
  # 还要按相同方式增加 apps/<app-id>/runtime.env 或对应的目标文件映射。
