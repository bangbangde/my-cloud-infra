api:
  dashboard: true
  insecure: false

# 全局日志配置
log:
  level: DEBUG  # 可选：DEBUG, INFO, WARN, ERROR
  format: common

# 访问日志配置（不填filePath则直接输出到stdout，docker logs可直接捕获）
accessLog:
  format: common
  bufferingSize: 100

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "${DOMAIN_NAME}"
            sans:
              - "*.${DOMAIN_NAME}"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik-net
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${ACME_EMAIL}
      storage: /etc/traefik/acme/acme.json
      dnsChallenge:
        provider: tencentcloud
        resolvers:
          - "119.29.29.29:53"
          - "182.254.116.116:53"
